name: wallpaper_sync
description: WallpaperSync - Daily Pinterest wallpaper sync for Android
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  workmanager: ^0.7.0
  async_wallpaper: ^2.1.0
  image: ^4.2.0
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  razorpay_flutter: ^1.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true
