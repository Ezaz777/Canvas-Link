name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

defaults:
  run:
    working-directory: mobile-client

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Recreate Android Project
        run: |
          mkdir -p /tmp/backup
          cp android/app/src/main/AndroidManifest.xml /tmp/backup/AndroidManifest.xml
          rm -rf android
          flutter create --project-name wallpaper_sync --platforms=android .
          sed -i "s/ext.kotlin_version = '[^']*'/ext.kotlin_version = '1.9.24'/g" android/build.gradle
          cp /tmp/backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WallpaperSync-APK
          path: mobile-client/build/app/outputs/flutter-apk/app-release.apk
