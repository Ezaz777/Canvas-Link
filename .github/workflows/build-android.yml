name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

defaults:
  run:
    working-directory: mobile-client

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Recreate Android Project
        run: |
          mkdir -p /tmp/backup
          cp android/app/src/main/AndroidManifest.xml /tmp/backup/AndroidManifest.xml
          rm -rf android
          flutter create --project-name wallpaper_sync --platforms=android .
          
          # Add ProGuard rules for razorpay_flutter and okhttp3
          cat << 'EOF' > android/app/proguard-rules.pro
          -keepclassmembers class * {
              @android.webkit.JavascriptInterface <methods>;
          }
          -keepattributes JavascriptInterface
          -keepattributes *Annotation*
          -dontwarn com.razorpay.**
          -keep class com.razorpay.** {*;}
          -optimizations !method/inlining/
          -keepclasseswithmembers class * {
            public void onPayment*(...);
          }
          -dontwarn org.conscrypt.**
          -dontwarn okhttp3.**
          EOF
          
          # Link proguard rules in build.gradle
          sed -i 's|// TODO: Add your own proguard rules lines if you need.|proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"|g' android/app/build.gradle
          
          sed -i "s/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g" android/app/build.gradle
          sed -i "s/minSdkVersion 16/minSdkVersion 21/g" android/app/build.gradle
          sed -i "s/minSdkVersion 19/minSdkVersion 21/g" android/app/build.gradle
          cp /tmp/backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Patch old plugins for AGP 8
        run: |
          cat << 'EOF' > patch_namespace.dart
          import 'dart:io';
          import 'dart:convert';
          void main() {
            final config = jsonDecode(File('.dart_tool/package_config.json').readAsStringSync());
            for (final pkg in config['packages']) {
              if (pkg['name'] == 'async_wallpaper') {
                final uri = pkg['rootUri'].toString().replaceFirst('file://', '');
                final gradleFile = File('$uri/android/build.gradle');
                if (gradleFile.existsSync()) {
                  final content = gradleFile.readAsStringSync();
                  if (!content.contains('namespace ')) {
                    gradleFile.writeAsStringSync(content.replaceFirst(RegExp(r'android\s*\{'), 'android {\n    namespace "com.codenameakshay.async_wallpaper"'));
                    print('Patched namespace for async_wallpaper');
                  }
                }
              }
            }
          }
          EOF
          dart run patch_namespace.dart

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WallpaperSync-APK
          path: mobile-client/build/app/outputs/flutter-apk/app-release.apk
