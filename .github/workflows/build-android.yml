name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

defaults:
  run:
    working-directory: mobile-client

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Recreate Android Project
        run: |
          mkdir -p /tmp/backup
          cp android/app/src/main/AndroidManifest.xml /tmp/backup/AndroidManifest.xml
          rm -rf android
          flutter create --project-name wallpaper_sync --platforms=android .
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.24"/' android/settings.gradle
          sed -i 's/id "com.android.application" version "[^"]*"/id "com.android.application" version "8.1.4"/' android/settings.gradle
          sed -i 's/gradle-[0-9\.]*-all\.zip/gradle-8.4-all.zip/' android/gradle/wrapper/gradle-wrapper.properties
          sed -i 's/VERSION_1_8/VERSION_17/g' android/app/build.gradle
          sed -i "s/jvmTarget = '1.8'/jvmTarget = '17'/g" android/app/build.gradle
          cp /tmp/backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WallpaperSync-APK
          path: mobile-client/build/app/outputs/flutter-apk/app-release.apk
